<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피카부 대구 팝업 - 제품별 판매 분석</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: rgba(255,255,255,0.06);
    --text: #e8e8ed; --text-dim: #8b8fa3; --accent: #6366f1;
    --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
    --pink: #ec4899; --blue: #3b82f6; --purple: #a855f7;
    --accent-light: #818cf8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:1200px; margin:0 auto; padding:20px 16px 60px; }
  .header { text-align:center; padding:32px 0 24px; }
  .header h1 { font-size:24px; font-weight:800; letter-spacing:-0.5px; }
  .header .sub { font-size:14px; color:var(--text-dim); margin-top:6px; }
  .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  .kpi { background:var(--card); border-radius:14px; padding:18px; text-align:center; border:1px solid var(--border); }
  .kpi .value { font-size:22px; font-weight:800; margin-bottom:4px; }
  .kpi .label { font-size:12px; color:var(--text-dim); }
  .card { background:var(--card); border-radius:16px; padding:24px; margin-bottom:20px; border:1px solid var(--border); }
  .section-title { font-size:16px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .section-title .icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-dim); transition:all .2s; }
  .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tab:hover { border-color:var(--accent); color:var(--text); }
  .product-row { display:flex; align-items:center; padding:12px 8px; border-bottom:1px solid var(--border); gap:8px; cursor:pointer; transition:background .15s; }
  .product-row:hover { background:rgba(99,102,241,0.06); }
  .product-row.expanded { background:rgba(99,102,241,0.04); border-bottom:none; }
  .rank { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; background:rgba(255,255,255,0.04); color:var(--text-dim); }
  .rank.gold { background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#000; }
  .rank.silver { background:linear-gradient(135deg,#d1d5db,#9ca3af); color:#000; }
  .rank.bronze { background:linear-gradient(135deg,#d97706,#b45309); color:#fff; }
  .p-name { flex:1; font-size:14px; font-weight:500; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .p-qty { width:60px; text-align:right; font-size:14px; font-weight:700; }
  .p-rev { width:100px; text-align:right; font-size:13px; color:var(--accent-light); }
  .p-price { width:70px; text-align:right; font-size:12px; color:var(--text-dim); }
  .p-arrow { width:20px; text-align:center; color:var(--text-dim); font-size:10px; transition:transform .2s; }
  .p-arrow.open { transform:rotate(90deg); }
  .detail-panel { padding:0 8px 16px 44px; display:none; border-bottom:1px solid var(--border); }
  .detail-panel.show { display:block; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .detail-section h4 { font-size:12px; color:var(--text-dim); margin-bottom:8px; font-weight:600; }
  .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .bar-label { width:70px; font-size:12px; color:var(--text); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bar-wrap { flex:1; height:20px; background:rgba(255,255,255,0.04); border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; min-width:2px; }
  .bar-val { width:36px; font-size:11px; color:var(--text-dim); text-align:right; }
  .cs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
  .cs-card { background:rgba(255,255,255,0.03); border-radius:10px; padding:12px; text-align:center; border:1px solid var(--border); }
  .cs-card .name { font-size:14px; font-weight:600; margin-bottom:4px; }
  .cs-card .qty { font-size:20px; font-weight:800; color:var(--accent-light); }
  .cs-card .rev { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .cs-card .pct { font-size:11px; color:var(--green); margin-top:2px; }
  .search-box { width:100%; padding:10px 16px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text); font-size:14px; outline:none; margin-bottom:16px; }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:var(--text-dim); }
  .sort-bar { display:flex; gap:6px; margin-bottom:12px; align-items:center; }
  .sort-btn { padding:5px 12px; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-dim); }
  .sort-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .sort-label { font-size:11px; color:var(--text-dim); margin-right:4px; }
  .top-bar { display:flex; align-items:flex-end; gap:4px; height:180px; padding:0 4px; }
  .top-bar-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; }
  .top-bar-col { width:100%; border-radius:4px 4px 0 0; min-height:4px; }
  .top-bar-name { font-size:9px; color:var(--text-dim); margin-top:6px; text-align:center; writing-mode:vertical-rl; height:60px; overflow:hidden; }
  .top-bar-qty { font-size:10px; font-weight:700; margin-bottom:4px; }
  .legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-dim); }
  .legend-dot { width:10px; height:10px; border-radius:3px; }
  @media(max-width:768px) {
    .kpi-grid { grid-template-columns:repeat(2,1fr); }
    .detail-grid { grid-template-columns:1fr; }
    .detail-panel { padding-left:8px; }
    .p-price { display:none; }
    .p-rev { width:80px; font-size:12px; }
    .cs-grid { grid-template-columns:repeat(2,1fr); }
    .top-bar { height:140px; }
    .top-bar-name { height:50px; font-size:8px; }
  }
</style>
</head>

function fmt(n){return n.toLocaleString('ko-KR');}
document.querySelectorAll('#mainTabs .tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('#mainTabs .tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none');document.getElementById('tab-'+t.dataset.tab).style.display='block';});});
let displayCount=30,currentSort='revenue',searchTerm='';
function sortP(p,s){const a=[...p];if(s==='revenue')a.sort((a,b)=>b.revenue-a.revenue);else if(s==='qty')a.sort((a,b)=>b.qty-a.qty);else a.sort((a,b)=>a.name.localeCompare(b.name,'ko'));return a;}
function renderProducts(){
  let filtered=PRODUCTS.filter(p=>!searchTerm||p.name.includes(searchTerm));
  let sorted=sortP(filtered,currentSort);
  let showing=sorted.slice(0,displayCount);
  const list=document.getElementById('productList');list.innerHTML='';
  showing.forEach((p,i)=>{
    const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const mcq=Math.max(...Object.values(p.colors),1);
    const msq=Math.max(...Object.values(p.sizes),1);
    let cb=Object.entries(p.colors).map(([c,q],ci)=>'<div class="bar-row"><div class="bar-label">'+c+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+(q/mcq*100)+'%;background:'+CP[ci%CP.length]+'"></div></div><div class="bar-val">'+q+'</div></div>').join('');
    let sb=Object.entries(p.sizes).map(([s,q],si)=>'<div class="bar-row"><div class="bar-label">'+s+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+(q/msq*100)+'%;background:'+CP[(si+5)%CP.length]+'"></div></div><div class="bar-val">'+q+'</div></div>').join('');
    const row=document.createElement('div');
    row.innerHTML='<div class="product-row" data-idx="'+i+'"><div class="rank '+rc+'">'+(i+1)+'</div><div class="p-name">'+p.name+'</div><div class="p-qty">'+fmt(p.qty)+'개</div><div class="p-rev">'+fmt(p.revenue)+'</div><div class="p-price">@'+fmt(p.price)+'</div><div class="p-arrow">&#x25B6;</div></div><div class="detail-panel" id="detail-'+i+'"><div class="detail-grid"><div class="detail-section"><h4>칼라별 판매 ('+Object.keys(p.colors).length+'종)</h4>'+cb+'</div><div class="detail-section"><h4>사이즈별 판매 ('+Object.keys(p.sizes).length+'종)</h4>'+sb+'</div></div></div>';
    list.appendChild(row);
  });
  list.querySelectorAll('.product-row').forEach(row=>{row.addEventListener('click',()=>{

    list.querySelectorAll('.detail-panel').forEach(p=>p.classList.remove('show'));list.querySelectorAll('.product-row').forEach(r=>{r.classList.remove('expanded');r.querySelector('.p-arrow').classList.remove('open');});
    if(!isOpen){panel.classList.add('show');row.classList.add('expanded');arrow.classList.add('open');}

document.getElementById('searchInput').addEventListener('input',e=>{searchTerm=e.target.value.trim();displayCount=30;renderProducts();});

function renderColors(){
  const tq=COLORS.reduce((s,c)=>s+c.qty,0);const mq=Math.max(...COLORS.map(c=>c.qty));
  document.getElementById('colorChart').innerHTML=COLORS.slice(0,20).map((c,i)=>'<div class="bar-row" style="margin-bottom:8px;"><div class="bar-label">'+c.name+'</div><div class="bar-wrap" style="height:24px;"><div class="bar-fill" style="width:'+(c.qty/mq*100)+'%;background:'+CP[i%CP.length]+'"></div></div><div class="bar-val" style="width:50px;">'+c.qty+'개</div></div>').join('');
  document.getElementById('colorGrid').innerHTML=COLORS.map(c=>'<div class="cs-card"><div class="name">'+c.name+'</div><div class="qty">'+fmt(c.qty)+'개</div><div class="rev">'+fmt(c.revenue)+'원</div><div class="pct">'+(c.qty/tq*100).toFixed(1)+'%</div></div>').join('');
}
function renderSizes(){
  const tq=SIZES.reduce((s,c)=>s+c.qty,0);const mq=Math.max(...SIZES.map(c=>c.qty));
  const so=['NEWBORN','06M','12M','18M','60','70','80','90','100','110','120','XS','S','M','L','XL','FREE','1호','2호','3호','4호','5호','6호','7호'];
  const ordered=[...SIZES].sort((a,b)=>{const ai=so.indexOf(a.name),bi=so.indexOf(b.name);if(ai>=0&&bi>=0)return ai-bi;if(ai>=0)return -1;if(bi>=0)return 1;return b.qty-a.qty;});
  document.getElementById('sizeChart').innerHTML=ordered.map((s,i)=>'<div class="bar-row" style="margin-bottom:8px;"><div class="bar-label">'+s.name+'</div><div class="bar-wrap" style="height:24px;"><div class="bar-fill" style="width:'+(s.qty/mq*100)+'%;background:'+CP[(i+3)%CP.length]+'"></div></div><div class="bar-val" style="width:50px;">'+s.qty+'개</div></div>').join('');
  document.getElementById('sizeGrid').innerHTML=ordered.map(s=>'<div class="cs-card"><div class="name">'+s.name+'</div><div class="qty">'+fmt(s.qty)+'개</div><div class="rev">'+fmt(s.revenue)+'원</div><div class="pct">'+(s.qty/tq*100).toFixed(1)+'%</div></div>').join('');
}
function renderTopChart(metric){
  const top20=sortP(PRODUCTS,metric).slice(0,20);const mv=Math.max(...top20.map(p=>metric==='revenue'?p.revenue:p.qty));
  document.getElementById('topBarChart').innerHTML=top20.map((p,i)=>{const v=metric==='revenue'?p.revenue:p.qty;const h=(v/mv*140)+4;const l=metric==='revenue'?(v/10000).toFixed(0)+'만':v+'개';return '<div class="top-bar-item"><div class="top-bar-qty">'+l+'</div><div class="top-bar-col" style="height:'+h+'px;background:'+CP[i%CP.length]+'"></div><div class="top-bar-name">'+p.name+'</div></div>';}).join('');
}
function renderTopColorBreakdown(){
  const top10=sortP(PRODUCTS,'revenue').slice(0,10);
  document.getElementById('topColorBreakdown').innerHTML=top10.map((p,pi)=>{
    const tq=p.qty;const colors=Object.entries(p.colors);
    const seg=colors.map(([c,q],ci)=>'<div style="width:'+(q/tq*100)+'%;height:100%;background:'+CP[ci%CP.length]+';display:inline-block;" title="'+c+': '+q+'개"></div>').join('');
    const leg=colors.map(([c,q],ci)=>'<span class="legend-item"><span class="legend-dot" style="background:'+CP[ci%CP.length]+'"></span>'+c+' '+q+'개 ('+(q/tq*100).toFixed(0)+'%)</span>').join('');
    return '<div style="margin-bottom:20px;"><div style="font-size:13px;font-weight:600;margin-bottom:6px;">'+(pi+1)+'. '+p.name+' <span style="color:var(--text-dim);font-weight:400;">('+fmt(p.qty)+'개, '+fmt(p.revenue)+'원)</span></div><div style="width:100%;height:24px;border-radius:6px;overflow:hidden;display:flex;">'+seg+'</div><div class="legend" style="margin-top:6px;">'+leg+'</div></div>';
  }).join('');
}
