<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피카부 위클리 인텔리전스</title>
<style>
  :root {
    --pink: #d4a0a0;
    --pink-light: #f7eded;
    --pink-dark: #b07878;
    --text: #3a3232;
    --text-sub: #7d6b6b;
    --bg: #faf8f8;
    --white: #ffffff;
    --border: #ede6e6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }

  .index-header {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-dark) 100%);
    color: white;
    padding: 56px 24px;
    text-align: center;
  }
  .index-header .brand {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 14px;
  }
  .index-header h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
  }
  .index-header .subtitle {
    font-size: 15px;
    opacity: 0.85;
  }

  .report-list {
    max-width: 700px;
    margin: 40px auto 60px;
    padding: 0 20px;
  }
  .year-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--pink-dark);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 32px 0 12px;
  }
  .year-label:first-child {
    margin-top: 0;
  }

  .report-card {
    display: block;
    background: var(--white);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 12px;
    text-decoration: none;
    color: var(--text);
    box-shadow: 0 1px 6px rgba(180, 140, 140, 0.06);
    transition: all 0.25s ease;
    border: 1px solid transparent;
  }
  .report-card:hover {
    box-shadow: 0 4px 20px rgba(180, 140, 140, 0.14);
    border-color: var(--pink-light);
    transform: translateY(-2px);
  }
  .report-card .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .report-card .week {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }
  .report-card .date {
    font-size: 13px;
    color: var(--text-sub);
    background: var(--pink-light);
    padding: 3px 10px;
    border-radius: 6px;
  }
  .report-card .headline {
    font-size: 14.5px;
    color: var(--text-sub);
    line-height: 1.65;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-sub);
  }

  .index-footer {
    text-align: center;
    padding: 32px 20px;
    font-size: 13px;
    color: var(--text-sub);
  }

  @media (max-width: 640px) {
    .index-header { padding: 40px 16px; }
    .index-header h1 { font-size: 24px; }
    .report-list { padding: 0 12px; }
    .report-card { padding: 20px; }
  }
</style>
</head>
<body>
  <header class="index-header">
    <div class="brand">Peekaboo Korea</div>
    <h1>Weekly Intelligence</h1>
    <div class="subtitle">Brand & Market Insights Archive</div>
  </header>

  <div class="report-list">
    <div class="year-label">2026</div>
<a href="2026-03-24.html" class="report-card">
  <div class="card-top">
    <span class="week">3월 4주차</span>
    <span class="date">2026-03-24</span>
  </div>
  <div class="headline">베네베네가 스킨케어 브랜드 '본보우(BonBou)'를 공식 론칭하며 의류·케어·홈 3축의 라이프스타일 브랜드 전환을 완성했습니다. "가족의 일상을 디자인하는" 피카부에게도 같은 전략적 질문이 주어졌습니다.</div>
</a>
<a href="2026-03-18.html" class="report-card">
  <div class="card-top">
    <span class="week">3월 3주차</span>
    <span class="date">2026-03-18</span>
  </div>
  <div class="headline"></div>
</a>
  </div>

  <div class="index-footer">
    <p>Peekaboo Weekly Intelligence &middot; Auto-generated every Monday</p>
  </div>
</body>
</html>
