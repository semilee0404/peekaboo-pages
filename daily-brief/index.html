.section { margin-bottom: 28px; }
.section-title { font-size: 11px; letter-spacing: 2px; color: #999; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; }
.hero { text-align: center; padding: 20px 0; }
.hero .amount { font-size: 36px; font-weight: 700; color: #2C2C2C; }

.ch-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0EEEB; }
.ch-name { color: #666; font-size: 14px; }
.ch-val { font-weight: 600; font-size: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 4px; border-bottom: 2px solid #E8E6E3; font-size: 11px; letter-spacing: 1px; color: #999; font-weight: 600; }
td { padding: 8px 4px; border-bottom: 1px solid #F0EEEB; }
.ok { color: #4A7C59; }
.warn { color: #C4533A; font-weight: 600; }
.actions { background: #F5F4F1; border-radius: 8px; padding: 16px 20px; }
.actions li { padding: 6px 0; font-size: 14px; line-height: 1.5; }
.alert { padding: 8px 12px; margin-bottom: 6px; border-radius: 6px; font-size: 13px; }
.alert.stockout { background: #FFF5F5; border-left: 3px solid #C4533A; }
.alert.slow { background: #FFFBF0; border-left: 3px solid #C4963A; }
.footer { text-align: center; padding: 24px 0; color: #CCC; font-size: 11px; letter-spacing: 2px; }
